name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            build-essential ccache \
            python3-dev

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-v5-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-v5-

      - name: Install Buildozer and p4a
        run: |
          pip install --upgrade pip wheel
          pip install cython==3.0.11
          pip install buildozer==1.5.0
          pip install git+https://github.com/kivy/python-for-android.git@v2026.05.09

      - name: Build APK
        run: buildozer android debug 2>&1 | tail -300

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NailStudio-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Show result
        run: ls -lh bin/*.apk 2>/dev/null || echo "APK not found"
