name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            git zip unzip \
            openjdk-17-jdk \
            autoconf automake libtool pkg-config \
            libffi-dev libssl-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            build-essential ccache \
            python3-dev

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-v11-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-${{ runner.os }}-v11-

      - name: Install Buildozer and p4a
        run: |
          pip install --upgrade pip wheel
          pip install cython==0.29.37
          pip install buildozer==1.5.0
          pip install python-for-android==2023.9.16

      - name: Build APK
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: |
          cp nail_android.py main.py
          buildozer android debug 2>&1 | tail -400

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: NailStudio-debug-apk
          path: bin/*.apk
          retention-days: 30

      - name: Show result
        run: ls -lh bin/*.apk 2>/dev/null || echo "APK not found"
