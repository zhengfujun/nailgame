name: Build Web (Pygbag)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: pygbag --build --ume_block 0 .

      - name: Bust cache - append timestamp to archive URL in HTML
        run: |
          TS=$(date +%s)
          HTML=build/web/index.html
          # 给 nailgame.tar.gz 加时间戳参数，强制浏览器每次重新下载
          sed -i "s|nailgame\.tar\.gz\"|nailgame.tar.gz?v=${TS}\"|g" "$HTML"
          # 加 no-store meta 标签防止缓存 HTML 本身
          sed -i 's|<head>|<head>\n<meta http-equiv="Cache-Control" content="no-store">|' "$HTML"
          echo "Cache-busted with timestamp: $TS"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
