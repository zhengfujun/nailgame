name: Build Web (Pygbag)

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install pygbag
        run: pip install pygbag

      - name: Build web bundle
        run: pygbag --build --ume_block 0 .

      - name: Bust cache
        run: |
          TS=$(date +%s)
          HTML=build/web/index.html
          sed -i "s|nailgame\.tar\.gz\"|nailgame.tar.gz?v=${TS}\"|g" "$HTML"
          sed -i 's|<head>|<head>\n<meta http-equiv="Cache-Control" content="no-store">|' "$HTML"

      - name: Deploy to GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

      - name: Publish dist branch for Cloudflare Pages
        run: |
          cd build/web
          git init
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add -A
          git commit -m "deploy: $(date '+%Y-%m-%d %H:%M:%S')"
          git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:dist

  deploy-github-pages:
    needs: build
    runs-on: ubuntu-22.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
